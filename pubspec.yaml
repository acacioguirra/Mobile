name: flutter_mobile_1
description: "BasePro - Conectando atletas e olheiros"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Vídeo
  video_player: ^2.9.1
  chewie: ^1.8.5
  file_picker: ^8.1.2

  # Imagens
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  provider: ^6.1.2
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
